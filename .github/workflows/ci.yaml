name: Chat Application Pipeline


on:
  workflow_dispatch:
  push:
    branches:
      - main

  
jobs:
  frontend:
    name: Build image for frontend and push it to docker hub
    runs-on: ubuntu-latest
    
    steps:
      - name: checkout out on github runner
        uses: actions/checkout@v4

      - name: Log in to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME  }}
          password: ${{ secrets.DOCKER_PASSWORD  }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME  }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_BASE_URL=${{ secrets.VITE_BASE_URL }}
            VITE_SOCKET_URL=${{ secrets.VITE_SOCKET_URL }}
  
  backend:
    name: Build image for backend and push it to docker hub
    runs-on: ubuntu-latest

    steps:
      - name: checkout on github runner
        uses: actions/checkout@v4
        
      - name: Login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ secrets.DOCKER_USERNAME }}/backend:latest

    
  deploy:
    name: Deply chat application to EC2
    runs-on: ubuntu-latest
    needs: [frontend,backend]

    steps:
      - name: checkout current repository in ec2 instance
        uses: actions/checkout@v4

      - name: Move compose file to ec2 instance 
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "compose.yaml"
          target: "/home/ubuntu"


      - name: SSH into EC2 and deploy 
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |

            cat > .env << EOF
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            PORT=${{ secrets.PORT }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            NODE_ENV=${{ secrets.NODE_ENV }}
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            EOF

            docker compose up -d --pull=always

    
