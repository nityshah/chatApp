name: Chat Application Pipeline


on:
  workflow_dispatch:
  push:
    branches:
      - main

  
jobs:
  frontend:
    name: Build image for frontend and push it to docker hub
    runs-on: ubuntu-latest
    
    steps:
      - name: checkout out on github runner
        uses: actions/checkout@v4

      - name: Log in to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME  }}
          password: ${{ secrets.DOCKER_PASSWORD  }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME  }}/frontend:latest
  
  backend:
    name: Build image for backend and push it to docker hub
    runs-on: ubuntu-latest

    steps:
      - name: checkout on github runner
        uses: actions/checkout@v4
        
      - name: Login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/backend:latest
          build-args: |
            MONGODB_URI=${MONGODB_URI}
            PORT=${PORT}
            JWT_SECRET=${JWT_SECRET}
            NODE_ENV=${NODE_ENV}
            CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
            CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
            CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}

    

